---
firewall_default_input_policy: DROP
firewall_default_forward_policy: DROP
firewall_default_output_policy: ACCEPT

firewall_default_sources: "{{ local_networks }}"

firewall_services:

  ssh:
    enabled: true
    protocol: tcp
    ports:
      - 22
    sources:
      - 192.168.0.100/32

  nginx:
    enabled: true
    protocol: tcp
    ports:
      - 80
      - 443
    sources:
      - 0.0.0.0/0

  dns-udp:
    protocol: udp
    ports:
      - 53
    sources:
      - 0.0.0.0/0

  dns-tcp:
    protocol: tcp
    ports:
      - 53
    sources:
      - 0.0.0.0/0

  etcd:
    enabled: true
    protocol: tcp
    ports:
      - 2379
    sources:
      - 192.168.0.0/24

  patroni:
    enabled: true
    protocol: tcp
    ports:
      - 8008
    sources:
      - 192.168.0.0/24

  postgres:
    enabled: true
    protocol: tcp
    ports:
      - 5432
    sources:
      - 192.168.0.0/24
