---
- name: Test docker role
  hosts: localhost
  become: true

  roles:
    - docker

  post_tasks:
    - name: Check running containers
      ansible.builtin.command: docker ps
      register: docker_ps
      changed_when: false

    - name: Verify Flask container is running
      ansible.builtin.assert:
        that:
          - "'flask-app' in docker_ps.stdout"
