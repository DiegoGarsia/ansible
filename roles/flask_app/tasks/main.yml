---
- name: Install Python packages (Debian)
  ansible.builtin.package:
    name:
      - python3
      - python3-pip
      - python3-venv
    state: present
  when: ansible_os_family == "Debian"

- name: Install Python packages (RedHat)
  ansible.builtin.package:
    name:
      - python3
      - python3-pip
    state: present
  when: ansible_os_family == "RedHat"

- name: Create application directory
  ansible.builtin.file:
    path: /opt/flask_app
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Copy Flask application
  ansible.builtin.copy:
    src: app.py
    dest: /opt/flask_app/app.py
    owner: root
    group: root
    mode: "0644"
  notify: Restart Flask

- name: Copy requirements file
  ansible.builtin.copy:
    src: requirements.txt
    dest: /opt/flask_app/requirements.txt
    owner: root
    group: root
    mode: "0644"

- name: Create Python virtual environment
  ansible.builtin.command:
    cmd: python3 -m venv /opt/flask_app/venv
    creates: /opt/flask_app/venv/bin/python

- name: Install Flask dependencies
  ansible.builtin.pip:
    requirements: /opt/flask_app/requirements.txt
    virtualenv: /opt/flask_app/venv

- name: Deploy systemd service
  ansible.builtin.template:
    src: flask.service.j2
    dest: /etc/systemd/system/flask.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart Flask

- name: Enable and start Flask service
  ansible.builtin.systemd:
    name: flask
    daemon_reload: true
    enabled: true
    state: started

- name: Configure firewalld for Flask
  when: ansible_os_family == "RedHat"
  block:

    - name: Ensure firewalld is running
      ansible.builtin.systemd:
        name: firewalld
        enabled: true
        state: started

    - name: Open Flask port in firewalld
      ansible.posix.firewalld:
        port: 8000/tcp
        permanent: true
        state: enabled
        immediate: true
