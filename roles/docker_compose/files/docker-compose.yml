services:
  frontend:
    build:
      context: .
    container_name: flask_frontend
    ports:
      - "5000:5000"
    networks:
      - flask_network
    depends_on:
      - backend
    command: python app.py

  backend:
    build:
      context: .
    container_name: flask_backend
    networks:
      - flask_network
    volumes:
      - backend_data:/data
    command: python backend.py

networks:
  flask_network:
    name: flask_network

volumes:
  backend_data:
    name: backend_data
