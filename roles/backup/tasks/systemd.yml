---
- name: Deploy PostgreSQL backup service
  ansible.builtin.template:
    src: pg-backup.service.j2
    dest: /etc/systemd/system/pg-backup.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Deploy PostgreSQL backup timer
  ansible.builtin.template:
    src: pg-backup.timer.j2
    dest: /etc/systemd/system/pg-backup.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Enable and start PostgreSQL backup timer
  ansible.builtin.systemd_service:
    name: pg-backup.timer
    enabled: true
    state: started
