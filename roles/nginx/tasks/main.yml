---
- name: Install nginx
  ansible.builtin.package:
    name: nginx
    state: present

- name: Create directory for private keys
  ansible.builtin.file:
    path: /etc/ssl/private
    state: directory
    mode: "0700"

- name: Copy wildcard certificate
  ansible.builtin.copy:
    src: nginx-wildcard.crt
    dest: /etc/ssl/certs/nginx-wildcard.crt
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Copy wildcard private key
  ansible.builtin.copy:
    src: nginx-wildcard.key
    dest: /etc/ssl/private/nginx-wildcard.key
    owner: root
    group: root
    mode: "0600"
  notify: Reload nginx

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Deploy reverse proxy configuration
  ansible.builtin.template:
    src: reverse_proxy.conf.j2
    dest: /etc/nginx/conf.d/reverse_proxy.conf
    mode: "0644"
  notify: Reload nginx

- name: Enable and start nginx
  ansible.builtin.service:
    name: nginx
    enabled: true
    state: started
