---
- name: Install Patroni systemd unit
  ansible.builtin.template:
    src: patroni.service.j2
    dest: /etc/systemd/system/patroni.service
    mode: "0644"
  when: "'patroni' in group_names"

- name: Reload systemd
  ansible.builtin.systemd_service:
    daemon_reload: true
  when: "'patroni' in group_names"

- name: Enable Patroni
  ansible.builtin.systemd_service:
    name: patroni
    enabled: true
  when: "'patroni' in group_names"

- name: Start Patroni
  ansible.builtin.systemd_service:
    name: patroni
    state: started
  when: "'patroni' in group_names"
