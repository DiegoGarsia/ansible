---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install PostgreSQL packages
  ansible.builtin.apt:
    name: "{{ postgres_packages }}"
    state: present

- name: Ensure PostgreSQL service is enabled
  ansible.builtin.service:
    name: "{{ postgres_service }}"
    enabled: true
    state: started
