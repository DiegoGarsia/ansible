---
bootstrap_user: diego
bootstrap_shell: /bin/bash
bootstrap_public_key: files/access_key.pub

bootstrap_timezone: Europe/Moscow

bootstrap_packages:
  Debian:
    - sudo
    - curl
    - wget
    - vim
    - git
    - htop
    - net-tools
    - dnsutils
    - qemu-guest-agent
    - locales

  RedHat:
    - sudo
    - curl
    - wget
    - vim
    - git
    - htop
    - net-tools
    - bind-utils
    - qemu-guest-agent
    - glibc-langpack-en

bootstrap_groups:
  Debian: sudo
  RedHat: wheel

ssh_service_name:
  Debian: ssh
  RedHat: sshd
