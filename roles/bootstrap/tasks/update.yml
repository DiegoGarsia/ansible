---
- name: Update APT package cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Upgrade Debian packages
  ansible.builtin.apt:
    upgrade: dist
    autoremove: true
    autoclean: true
  when: ansible_os_family == "Debian"

- name: Upgrade RedHat packages
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_only: true
  when: ansible_os_family == "RedHat"
