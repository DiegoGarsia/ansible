---
# Сначала читаем текущее состояние. Это позволяет не делать PUT на каждом
# прогоне и сохраняет идемпотентность роли.
- name: Read existing CI/CD variables from project
  ansible.builtin.uri:
    url: "{{ gitlab_external_url }}/api/v4/projects/{{ gitlab_project_id | urlencode }}/variables/{{ item.key | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ gitlab_api_token }}"
    status_code: [200, 404]
    validate_certs: "{{ gitlab_external_url is match('^https://') }}"
  register: gitlab_variable_current
  changed_when: false
  loop: "{{ gitlab_cicd_variables }}"
  no_log: true

- name: Create absent CI/CD variables in project
  ansible.builtin.uri:
    url: "{{ gitlab_external_url }}/api/v4/projects/{{ gitlab_project_id | urlencode }}/variables"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ gitlab_api_token }}"
    body_format: form-urlencoded
    body:
      key: "{{ item.item.key }}"
      value: "{{ item.item.value }}"
      variable_type: "{{ item.item.variable_type | default('env_var') }}"
      protected: "{{ item.item.protected | default(true) | bool | lower }}"
      masked: "{{ item.item.masked | default(true) | bool | lower }}"
    status_code: 201
    validate_certs: "{{ gitlab_external_url is match('^https://') }}"
  loop: "{{ gitlab_variable_current.results | selectattr('status', 'equalto', 404) | list }}"
  no_log: true

- name: Update changed CI/CD variables in project
  ansible.builtin.uri:
    url: "{{ gitlab_external_url }}/api/v4/projects/{{ gitlab_project_id | urlencode }}/variables/{{ item.item.key | urlencode }}"
    method: PUT
    headers:
      PRIVATE-TOKEN: "{{ gitlab_api_token }}"
    body_format: form-urlencoded
    body:
      value: "{{ item.item.value }}"
      variable_type: "{{ item.item.variable_type | default('env_var') }}"
      protected: "{{ item.item.protected | default(true) | bool | lower }}"
      masked: "{{ item.item.masked | default(true) | bool | lower }}"
    status_code: 200
    validate_certs: "{{ gitlab_external_url is match('^https://') }}"
  loop: "{{ gitlab_variable_current.results | selectattr('status', 'equalto', 200) | list }}"
  when: >-
    item.json.value != (item.item.value | string) or
    item.json.variable_type != (item.item.variable_type | default('env_var')) or
    (item.json.protected | bool) != (item.item.protected | default(true) | bool) or
    (item.json.masked | bool) != (item.item.masked | default(true) | bool)
  no_log: true
