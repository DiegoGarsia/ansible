---
- name: Download GitLab Runner repository installer
  ansible.builtin.get_url:
    url: https://packages.gitlab.com/install/repositories/runner/gitlab-runner/script.deb.sh
    dest: /usr/local/sbin/install-gitlab-runner-repository
    mode: "0755"
    force: false
    timeout: 60

- name: Add GitLab Runner package repository
  ansible.builtin.command:
    cmd: /usr/local/sbin/install-gitlab-runner-repository
  args:
    creates: /etc/apt/sources.list.d/runner_gitlab-runner.list

- name: Install GitLab Runner
  ansible.builtin.apt:
    name: gitlab-runner
    state: present
    update_cache: true

- name: Enable GitLab Runner service
  ansible.builtin.systemd_service:
    name: gitlab-runner
    enabled: true
    state: started

- name: Check registered runners
  ansible.builtin.command:
    cmd: gitlab-runner list
  register: gitlab_runner_list
  changed_when: false
  failed_when: false

- name: Register Docker runner
  ansible.builtin.command:
    argv:
      - gitlab-runner
      - register
      - --non-interactive
      - --url
      - "{{ gitlab_external_url }}"
      - --token
      - "{{ gitlab_runner_token }}"
      - --executor
      - "{{ gitlab_runner_executor }}"
      - --description
      - "{{ gitlab_runner_name }}"
      - --docker-image
      - "{{ gitlab_runner_docker_image }}"
      - --docker-privileged=true
  register: gitlab_runner_register
  changed_when: gitlab_runner_register.rc == 0
  when:
    - gitlab_runner_token | length > 0
    - gitlab_runner_name not in gitlab_runner_list.stdout_lines | join('\n')

- name: Report missing runner token
  ansible.builtin.debug:
    msg: "Runner не зарегистрирован: задайте gitlab_runner_token из Ansible Vault."
  when: gitlab_runner_token | length == 0
