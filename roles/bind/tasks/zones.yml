---
- name: Deploy forward zone
  ansible.builtin.template:
    src: db.forward.j2
    dest: "/etc/bind/db.{{ dns_domain }}"
    owner: root
    group: bind
    mode: "0644"
  notify: Restart bind9

- name: Deploy reverse zone
  ansible.builtin.template:
    src: db.reverse.j2
    dest: "/etc/bind/db.{{ dns_reverse_zone }}"
    owner: root
    group: bind
    mode: "0644"
  notify: Restart bind9

- name: Check BIND configuration
  ansible.builtin.command: named-checkconf
  changed_when: false

- name: Check forward zone
  ansible.builtin.command:
    cmd: "named-checkzone {{ dns_domain }} /etc/bind/db.{{ dns_domain }}"
  changed_when: false

- name: Check reverse zone
  ansible.builtin.command:
    cmd: "named-checkzone {{ dns_reverse_zone }} /etc/bind/db.{{ dns_reverse_zone }}"
  changed_when: false
