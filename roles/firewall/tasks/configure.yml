---
- name: Create iptables configuration directory
  ansible.builtin.file:
    path: /etc/iptables
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy iptables configuration
  ansible.builtin.template:
    src: iptables.rules.j2
    dest: /etc/iptables/rules.v4
    owner: root
    group: root
    mode: "0644"
  notify: Restore iptables rules
